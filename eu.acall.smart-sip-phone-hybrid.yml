app-id: eu.acall.smart-sip-phone-hybrid
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: smart-sip-phone-launch

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=all
  - --filesystem=~/FusionSIP_Contacts.csv:ro
  - --talk-name=org.freedesktop.secrets
  - --env=WEBKIT_DISABLE_DMABUF_RENDERER=1

modules:
  - name: smart-sip-phone
    only-arches:
      - x86_64
    buildsystem: simple
    build-commands:
      - install -Dm644 alsa-config/conf.d/default.conf /app/etc/alsa/conf.d/default.conf
      - install -Dm755 Smart-SIP-Phone-Hybrid /app/bin/Smart-SIP-Phone-Hybrid
      - install -Dm755 smart-sip-phone-launch.sh /app/bin/smart-sip-phone-launch
      - |
        if [ -x extra-bin/ip ]; then
          install -Dm755 extra-bin/ip /app/bin/ip
        elif [ -x ip ]; then
          install -Dm755 ip /app/bin/ip
        else
          echo "ERROR: staged ip binary missing (extra-bin/ip)" >&2
          exit 1
        fi
        for audio_bin in aplay arecord; do
          if [ -x "extra-bin/${audio_bin}" ]; then
            install -Dm755 "extra-bin/${audio_bin}" "/app/bin/${audio_bin}"
          elif [ -x "${audio_bin}" ]; then
            install -Dm755 "${audio_bin}" "/app/bin/${audio_bin}"
          else
            echo "ERROR: staged ${audio_bin} binary missing (extra-bin/${audio_bin})" >&2
            exit 1
          fi
        done
      - install -Dm644 eu.acall.smart-sip-phone-hybrid.desktop /app/share/applications/eu.acall.smart-sip-phone-hybrid.desktop
      - install -Dm644 eu.acall.smart-sip-phone-hybrid.metainfo.xml /app/share/metainfo/eu.acall.smart-sip-phone-hybrid.metainfo.xml
      - |
        for size in 48 64 128 256 512; do
          install -Dm644 Icon512.png /app/share/icons/hicolor/${size}x${size}/apps/eu.acall.smart-sip-phone-hybrid.png
        done
        gtk-update-icon-cache -f -t /app/share/icons/hicolor || true
      - |
        for libdir in /usr/lib/x86_64-linux-gnu /usr/lib64 /usr/lib; do
          if [ -f "${libdir}/libcurl.so.4" ]; then
            install -Dm755 "${libdir}/libcurl.so.4" /app/lib/libcurl.so.4
            ln -sf libcurl.so.4 /app/lib/libcurl.so
            break
          fi
        done
        install_staged_lib() {
          local name="$1"
          shift
          local candidate found=0
          for candidate in "$@"; do
            if [ -f "$candidate" ]; then
              install -Dm755 "$candidate" "/app/lib/${name}"
              found=1
              break
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "ERROR: missing staged library ${name}" >&2
            exit 1
          fi
        }
        install_staged_lib libmnl.so.0 libmnl.so.0 extra-libs/libmnl.so.0
        install_staged_lib libbpf.so.1 libbpf.so.1 extra-libs/libbpf.so.1
        install_staged_lib libcap.so.2 libcap.so.2 extra-libs/libcap.so.2
        install_staged_lib libelf.so.1 libelf.so.1 extra-libs/libelf.so.1
        install_staged_lib libpcre2-8.so.0 libpcre2-8.so.0 extra-libs/libpcre2-8.so.0
        install_staged_lib libselinux.so.1 libselinux.so.1 extra-libs/libselinux.so.1
        install_staged_lib libz.so.1 libz.so.1 extra-libs/libz.so.1
        install_staged_lib libzstd.so.1 libzstd.so.1 extra-libs/libzstd.so.1
        for lib in libnl-3.so.200 libnl-3.so.200.* extra-libs/libnl-3.so.200 extra-libs/libnl-3.so.200.*; do
          if [ -f "$lib" ]; then
            install -Dm755 "$lib" "/app/lib/$(basename "$lib")"
          fi
        done
    sources:
      - type: archive
        url: https://github.com/ednt/smart-sip-phone-hybrid-flathub/releases/download/v1.7.0/smart-sip-phone-hybrid-1.7.0-flathub.tar.xz
        sha256: af472a0b164f70d5dfcd9fec9c496c9422c109b8e954b0f1c223c881085409bb
        strip-components: 0
        only-arches:
          - x86_64
