# SPDX-License-Identifier: MIT
app-id: eu.acall.smart-sip-phone-hybrid
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: smart-sip-phone-launch

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  # pw-mon: PipeWire-Device hotplug (PipeWire_Monitor)
  - --filesystem=xdg-run/pipewire-0:ro

modules:
  - name: smart-sip-phone
    buildsystem: simple
    build-commands:
      - install -Dm644 alsa-config/conf.d/default.conf /app/etc/alsa/conf.d/default.conf
      - install -Dm755 Smart-SIP-Phone-Hybrid /app/bin/Smart-SIP-Phone-Hybrid
      - install -Dm755 smart-sip-phone-launch.sh /app/bin/smart-sip-phone-launch
      - install -Dm755 extra-bin/{ip,aplay,arecord,pw-mon} -t /app/bin
      - install -Dm644 eu.acall.smart-sip-phone-hybrid.desktop /app/share/applications/eu.acall.smart-sip-phone-hybrid.desktop
      - install -Dm644 eu.acall.smart-sip-phone-hybrid.metainfo.xml /app/share/metainfo/eu.acall.smart-sip-phone-hybrid.metainfo.xml
      - install -Dm644 Icon48x48.png /app/share/icons/hicolor/48x48/apps/eu.acall.smart-sip-phone-hybrid.png
      - install -Dm644 Icon64x64.png /app/share/icons/hicolor/64x64/apps/eu.acall.smart-sip-phone-hybrid.png
      - install -Dm644 Icon128x128.png /app/share/icons/hicolor/128x128/apps/eu.acall.smart-sip-phone-hybrid.png
      - install -Dm644 Icon256x256.png /app/share/icons/hicolor/256x256/apps/eu.acall.smart-sip-phone-hybrid.png
      - install -Dm644 Icon512x512.png /app/share/icons/hicolor/512x512/apps/eu.acall.smart-sip-phone-hybrid.png
      - install -Dm644 EULA.txt /app/share/licenses/eu.acall.smart-sip-phone-hybrid/EULA.txt
      - install -Dm644 THIRD-PARTY-LICENSES /app/share/licenses/eu.acall.smart-sip-phone-hybrid/THIRD-PARTY-LICENSES
      - mkdir -p /app/lib
      - cp -a extra-libs/. /app/lib/
    sources:
      - type: archive
        url: https://github.com/ednt/smart-sip-phone-hybrid-flathub/releases/download/v1.7.0/smart-sip-phone-hybrid-1.7.0-flathub-8.tar.xz
        sha256: f8695f71751086140fc8b7739cf002c7b3b249285b938cefb3eea086f2954e51
        strip-components: 0
